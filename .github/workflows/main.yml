name: Job Radar — Main Sources

on:
  schedule:
    # Weekdays: 9 AM and 2 PM EST (UTC-4 = UTC+0 offset of 13 and 18)
    - cron: "0 13 * * 1-5"   # 9 AM EST weekdays
    - cron: "0 18 * * 1-5"   # 2 PM EST weekdays
    # Weekend: once daily at 10 AM EST (jobs posted Friday stay over weekend)
    - cron: "0 14 * * 6,0"   # 10 AM EST Saturday & Sunday
  workflow_dispatch:           # Manual trigger

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Radar (main mode)
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main --mode main

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
