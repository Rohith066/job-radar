name: Job Radar — Board Sweep

on:
  schedule:
    # Weekdays: 8 AM, 1 PM, 6 PM EST (offset 30 min from main to avoid clashes)
    - cron: "30 12 * * 1-5"  # 8:30 AM EST weekdays
    - cron: "30 17 * * 1-5"  # 1:30 PM EST weekdays
    - cron: "30 22 * * 1-5"  # 6:30 PM EST weekdays
    # Weekend: once daily
    - cron: "30 14 * * 6,0"  # 10:30 AM EST Saturday & Sunday
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Boards per batch (default: 50)"
        required: false
        default: "50"
      run_until_wrap:
        description: "Full sweep (run until cursor wraps)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run board sweep
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BATCH=${{ github.event.inputs.batch_size || '50' }}
          WRAP=${{ github.event.inputs.run_until_wrap || 'false' }}
          CMD="python -m src.main --mode boards --boards-batch-size $BATCH"
          [ "$WRAP" = "true" ] && CMD="$CMD --boards-run-until-wrap"
          eval $CMD

      - name: Export dead boards report
        run: python -m src.main --mode boards --dry-run --export-dead-csv state/dead_boards.csv
        continue-on-error: true

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update boards state [skip ci]"
          git push
