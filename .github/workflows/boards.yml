name: Job Radar — Board Sweep

on:
  schedule:
    # Weekdays: every 3 hours 8 AM – 8 PM EDT, offset 30 min from main to avoid clashes
    - cron: "30 12,15,18,21 * * 1-5"  # 8:30 AM, 11:30 AM, 2:30 PM, 5:30 PM EDT Mon–Fri
    - cron: "30 0 * * 2-6"            # 8:30 PM EDT Mon–Fri
    # Weekend: twice daily
    - cron: "30 13,19 * * 6,0"        # 9:30 AM & 3:30 PM EDT Sat & Sun
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Boards per batch (default: 50)"
        required: false
        default: "50"
      run_until_wrap:
        description: "Full sweep (run until cursor wraps)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run board sweep
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BATCH=${{ github.event.inputs.batch_size || '50' }}
          WRAP=${{ github.event.inputs.run_until_wrap || 'false' }}
          CMD="python -m src.main --mode boards --boards-batch-size $BATCH"
          [ "$WRAP" = "true" ] && CMD="$CMD --boards-run-until-wrap"
          eval $CMD

      - name: Export dead boards report
        run: python -m src.main --mode boards --dry-run --export-dead-csv state/dead_boards.csv
        continue-on-error: true

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update boards state [skip ci]"
          git push
